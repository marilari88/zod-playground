name: pr

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ✅ Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Biome check
        run: npm run biome:ci
      - name: Types and build checks
        run: npm run build

  test:
    name: 🧪 Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install test browsers
        run: npm run test:install
      - name: Run tests
        run: npm run test

  build-preview:
    name: 🏗️ Build Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Save PR number
        run: |
          mkdir -p ./pr-meta
          echo ${{ github.event.number }} > ./pr-meta/pr-number.txt
      - name: Upload PR number
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: ./pr-meta/pr-number.txt
          retention-days: 1
